[pytest]
minversion = 7.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    -p no:warnings
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    skip_torch: skip tests requiring torch
    skip_transformers: skip tests requiring transformers
    skip_cvxpy: skip tests requiring cvxpy
